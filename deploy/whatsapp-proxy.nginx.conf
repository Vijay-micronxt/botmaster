# /etc/nginx/conf.d/whatsapp-proxy.conf
# WhatsApp Passthrough Proxy — botmaster.storenxt.in
# Sits alongside existing Frappe Nginx config without conflict

server {
    listen 80;
    server_name botmaster.storenxt.in;

    # Redirect all HTTP to HTTPS (Certbot will manage this block)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name botmaster.storenxt.in;

    # ── SSL (Certbot will auto-populate these paths) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/botmaster.storenxt.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/botmaster.storenxt.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Proxy to FastAPI on port 8001 ─────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;

        # Pass real client IP (used by IPWhitelistMiddleware)
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — generous for WhatsApp API calls
        proxy_connect_timeout 10s;
        proxy_read_timeout    35s;
        proxy_send_timeout    35s;
    }
}
